services:
  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: gymsphere-backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ../backend:/app
    networks:
      - gymsphere-network

  frontend:  # ✅ SINGLE frontend service with all config
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: gymsphere-frontend
    ports:
      - "3001:80"  # Changed to 3001 to avoid port conflict
    volumes:
      - ../frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - gymsphere-network

networks:
  gymsphere-network:
    driver: bridge
