server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Serve Vite/React build assets as static files
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA fallback: send all non-file paths to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: if you want frontend to call /api without absolute URLs,
  # uncomment this block to reverse proxy API calls to the backend:
  # location /api/ {
  #   proxy_pass http://backend:8000/;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  # }
}
